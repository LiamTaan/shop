version: "3.4"

name: yudao-system

services:
  mysql:
    container_name: yudao-mysql
    image: mysql:8
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ruoyi-vue-pro}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    volumes:
      - mysql:/var/lib/mysql/
      - ./sql/mysql/ruoyi-vue-pro.sql:/docker-entrypoint-initdb.d/ruoyi-vue-pro.sql:ro

  redis:
    container_name: yudao-redis
    image: redis:6-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis:/data

  shop-ai-service:
    container_name: shop-ai-service
    build:
      context: ../../../shop-ai-service
      dockerfile: Dockerfile
    image: shop-ai-service:local
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${SHOP_AI_APP_ENV:-docker}
      LOG_LEVEL: ${SHOP_AI_LOG_LEVEL:-INFO}
      SHOP_SERVER_BASE_URL: ${SHOP_AI_SHOP_SERVER_BASE_URL:-http://yudao-server:48080}
      SHOP_SERVER_INTERNAL_TOKEN: ${SHOP_AI_INTERNAL_TOKEN:-shop-ai-internal-change-me}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      MEMORY_BACKEND: ${SHOP_AI_MEMORY_BACKEND:-sqlite}
      MEMORY_DB_PATH: /app/data/shop-ai.db
      KNOWLEDGE_DIR: /app/knowledge
      KNOWLEDGE_DB_PATH: /app/data/shop-ai-knowledge.db
      AUDIT_DB_PATH: /app/data/shop-ai-audit.db
      RATE_LIMIT_PER_MINUTE: ${SHOP_AI_RATE_LIMIT_PER_MINUTE:-30}
      REDIS_URL: ${SHOP_AI_REDIS_URL:-redis://yudao-redis:6379/1}
    volumes:
      - shop-ai-data:/app/data
    depends_on:
      - redis

  server:
    container_name: yudao-server
    build:
      context: ./yudao-server/
    image: yudao-server
    restart: unless-stopped
    ports:
      - "48080:48080"
    environment:
      # https://github.com/polovyivan/docker-pass-configs-to-container
      SPRING_PROFILES_ACTIVE: local
      JAVA_OPTS:
        ${JAVA_OPTS:-
          -Xms512m
          -Xmx512m
          -Djava.security.egd=file:/dev/./urandom
        }
      ARGS:
        --spring.datasource.dynamic.datasource.master.url=${MASTER_DATASOURCE_URL:-jdbc:mysql://yudao-mysql:3306/ruoyi-vue-pro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true}
        --spring.datasource.dynamic.datasource.master.username=${MASTER_DATASOURCE_USERNAME:-root}
        --spring.datasource.dynamic.datasource.master.password=${MASTER_DATASOURCE_PASSWORD:-123456}
        --spring.datasource.dynamic.datasource.slave.url=${SLAVE_DATASOURCE_URL:-jdbc:mysql://yudao-mysql:3306/ruoyi-vue-pro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true}
        --spring.datasource.dynamic.datasource.slave.username=${SLAVE_DATASOURCE_USERNAME:-root}
        --spring.datasource.dynamic.datasource.slave.password=${SLAVE_DATASOURCE_PASSWORD:-123456}
        --spring.data.redis.host=${REDIS_HOST:-yudao-redis}
        --yudao.ai.service.base-url=${SHOP_AI_SERVICE_BASE_URL:-http://shop-ai-service:8000}
        --yudao.ai.service.internal-token=${SHOP_AI_INTERNAL_TOKEN:-shop-ai-internal-change-me}
    depends_on:
      - mysql
      - redis
      - shop-ai-service

volumes:
  mysql:
    driver: local
  redis:
    driver: local
  shop-ai-data:
    driver: local