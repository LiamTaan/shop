# Shop AI Service compose overlay (optional standalone).
# Prefer shop-server/script/docker/docker-compose.yml for full stack.

services:
  shop-ai-service:
    build: .
    image: shop-ai-service:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SHOP_SERVER_BASE_URL: ${SHOP_SERVER_BASE_URL:-http://host.docker.internal:48080}
      MEMORY_DB_PATH: /app/data/shop-ai.db
      KNOWLEDGE_DIR: /app/knowledge
      KNOWLEDGE_DB_PATH: /app/data/shop-ai-knowledge.db
      AUDIT_DB_PATH: /app/data/shop-ai-audit.db
    volumes:
      - shop-ai-data:/app/data
      - ./knowledge:/app/knowledge:ro

volumes:
  shop-ai-data: